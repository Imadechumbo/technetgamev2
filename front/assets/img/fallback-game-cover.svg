<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
<title id="title">Fallback de capa TechNetGame</title>
<desc id="desc">Arte fallback para jogos sem imagem automática</desc>
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#0c1f18"/>
    <stop offset="55%" stop-color="#07120d"/>
    <stop offset="100%" stop-color="#030806"/>
  </linearGradient>
  <linearGradient id="glow" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#2dd881" stop-opacity="0.1"/>
    <stop offset="50%" stop-color="#2dd881" stop-opacity="0.35"/>
    <stop offset="100%" stop-color="#2dd881" stop-opacity="0.1"/>
  </linearGradient>
</defs>
<rect width="1280" height="720" fill="url(#bg)"/>
<rect x="44" y="44" width="1192" height="632" rx="36" fill="none" stroke="#1fb667" stroke-opacity="0.3"/>
<rect x="88" y="120" width="1104" height="12" rx="6" fill="url(#glow)"/>
<g fill="#e8f4ee">
  <text x="92" y="265" font-family="Roboto, Arial, sans-serif" font-size="88" font-weight="700">TechNetGame</text>
  <text x="92" y="356" font-family="Roboto, Arial, sans-serif" font-size="46" fill="#2dd881">capa automática indisponível</text>
  <text x="92" y="430" font-family="Roboto, Arial, sans-serif" font-size="34" fill="#8ea49a">o backend tenta RAWG + cache e volta para este fallback quando necessário</text>
</g>
</svg>